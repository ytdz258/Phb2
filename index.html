<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>木叶音乐积分排行榜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f1f5f9;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 16px 12px 40px;
            color: #0f172a;
        }

        .app {
            max-width: 550px;
            margin: 0 auto;
        }

        /* 排行榜控制栏 */
        .room-bar {
            background: white;
            border-radius: 48px;
            padding: 8px 12px 8px 20px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #e2e8f0;
        }
        .room-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 2;
            min-width: 140px;
            background: #f8fafc;
            padding: 6px 14px;
            border-radius: 40px;
        }
        .room-label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
        }
        .room-id {
            font-weight: 700;
            font-size: 16px;
            color: #f97316;
            background: #fff1e6;
            padding: 4px 12px;
            border-radius: 32px;
            letter-spacing: 0.5px;
        }
        .room-actions {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background: #f1f5f9;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #334155;
        }
        .icon-btn:active {
            transform: scale(0.94);
            background: #e2e8f0;
        }
        .btn-primary-sm {
            background: #f97316;
            color: white;
            width: auto;
            padding: 0 16px;
            font-size: 14px;
            gap: 6px;
        }
        .btn-primary-sm:active {
            background: #ea580c;
        }

        /* 加入/创建 弹窗面板 */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-card {
            background: white;
            width: 85%;
            max-width: 320px;
            border-radius: 40px;
            padding: 24px 20px;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.2);
        }
        .modal-card h3 {
            font-size: 20px;
            margin-bottom: 16px;
        }
        .modal-card input {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: 1px solid #cbd5e1;
            font-size: 16px;
            margin-bottom: 20px;
            text-align: center;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .confirm-btn {
            background: #f97316;
            color: white;
        }
        .cancel-btn {
            background: #e2e8f0;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #f97316, #ea580c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .online-badge {
            background: #10b981;
            color: white;
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 5px;
        }

        /* 新增学员 */
        .join-card {
            background: white;
            border-radius: 28px;
            padding: 14px 18px;
            margin-bottom: 18px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            border: 1px solid #eef2f6;
        }
        .row-flex {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .input-group {
            flex: 2;
            min-width: 130px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d9e8;
            border-radius: 44px;
            font-size: 15px;
            background: #fff;
            outline: none;
        }
        .input-group input:focus {
            border-color: #f97316;
            box-shadow: 0 0 0 2px #fed7aa;
        }
        .join-btn {
            background: #f97316;
            border: none;
            padding: 12px 20px;
            border-radius: 44px;
            font-weight: 600;
            font-size: 15px;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            white-space: nowrap;
        }
        .join-btn:active {
            transform: scale(0.96);
        }

        /* 排行榜 */
        .rank-panel {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 18px rgba(0,0,0,0.05);
            border: 1px solid #eef2f6;
        }
        .rank-header {
            display: grid;
            grid-template-columns: 55px 1fr 80px;
            background: #f8fafc;
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #475569;
            border-bottom: 1px solid #eef2f6;
        }
        .rank-list {
            max-height: 50vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .rank-item {
            display: grid;
            grid-template-columns: 55px 1fr 80px;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #f0f2f5;
            background: white;
        }
        .rank-num {
            font-weight: 700;
            font-size: 17px;
            text-align: center;
        }
        .rank-1 { color: #fbbf24; text-shadow: 0 0 2px gold; }
        .rank-2 { color: #94a3b8; }
        .rank-3 { color: #cd7f32; }
        .player-name {
            font-weight: 500;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .score-box {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
        }
        .score-number {
            font-weight: 800;
            font-size: 17px;
            color: #0f172a;
            min-width: 42px;
            text-align: right;
        }
        .score-actions {
            display: flex;
            gap: 6px;
        }
        .score-btn {
            background: #f1f5f9;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .score-btn:active {
            transform: scale(0.92);
        }
        .btn-plus {
            background: #e6f7e6;
            color: #15803d;
        }
        .btn-minus {
            background: #fee2e2;
            color: #b91c1c;
        }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: #94a3b8;
            font-size: 14px;
        }
        .footer-tip {
            text-align: center;
            font-size: 10px;
            color: #94a3b8;
            margin-top: 14px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293be6;
            backdrop-filter: blur(10px);
            color: #fef9c3;
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 13px;
            pointer-events: none;
            z-index: 1100;
            transition: opacity 0.2s;
            white-space: nowrap;
            font-weight: 500;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>🏟️ 独立额外排行榜</h1>
        <div class="online-badge">🌐 实时同步 </div>
    </div>

    <!-- 排行榜控制栏 -->
    <div class="room-bar">
        <div class="room-info">
            <span class="room-label">当前排行榜</span>
            <span class="room-id" id="currentRoomId">加载中</span>
        </div>
        <div class="room-actions">
            <button class="icon-btn" id="switchRoomBtn">🏠 切换</button>
            <button class="icon-btn btn-primary-sm" id="createRoomBtn">➕ 新建排行榜</button>
        </div>
    </div>

    <!-- 加入学员 -->
    <div class="join-card">
        <div class="row-flex">
            <div class="input-group">
                <input type="text" id="playerName" placeholder="昵称" maxlength="16" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="number" id="initScore" placeholder="初始积分" value="0" step="10">
            </div>
            <button class="join-btn" id="addPlayerBtn">➕ 加入榜单</button>
        </div>
        <div style="font-size: 11px; margin-top: 8px; color:#6c757d;">⚡ 点击 +1 / -1 调整积分，同房间内所有人实时可见</div>
    </div>

    <!-- 排行榜 -->
    <div class="rank-panel">
        <div class="rank-header">
            <span>🏅 排名</span>
            <span>玩家</span>
            <span style="text-align: right;">积分 / 操作</span>
        </div>
        <div id="rankList" class="rank-list">
            <div class="empty-state">⏳ 加载排行榜数据...</div>
        </div>
    </div>
    <div class="footer-tip">
        💡 每个排行榜独立排行 | 创建或切换排行榜即可拥有新榜单 | 数据云端保存
    </div>
</div>

<!-- 排行榜切换弹窗 -->
<div id="roomModal" class="modal-mask">
    <div class="modal-card">
        <h3 id="modalTitle">🔁 切换排行榜</h3>
        <input type="text" id="roomCodeInput" placeholder="排行榜ID (字母/数字)" maxlength="20" autocomplete="off">
        <div class="modal-buttons">
            <button id="modalConfirmBtn" class="confirm-btn">确认</button>
            <button id="modalCancelBtn" class="cancel-btn">取消</button>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast" style="opacity:0;">提示</div>

<script>
    // ---------- 多排行榜积分榜 ----------
    // 基于 Supabase (国内访问稳定)，表结构支持 room_id 字段
    // 表名: players_multi 字段: id, name, score, room_id, updated_at
    // 为了演示自动建表，但需要提前创建好，但已在supabase项目中创建players_multi表 
    // 若没有表会报错，为了保证直接可用，我在代码中做了初始化检测；但学员可自行创建。本次使用可靠测试表。
    const SUPABASE_URL = 'https://mkyrvvcgffqjvrbquvbo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1reXJ2dmNnZmZxanZyYnF1dmJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTMyMjQwODAsImV4cCI6MjAyODgwMDA4MH0.3NadR7V_0UPL5m00-LZkx9peHC0H2LtIwxHRUsJ70Dk';
    
    let supabase;
    let currentRoom = localStorage.getItem('active_room_id') || 'lobby';   // 默认大厅
    let realtimeChannel = null;
    
    // DOM 元素
    const rankContainer = document.getElementById('rankList');
    const currentRoomSpan = document.getElementById('currentRoomId');
    const toastMsg = document.getElementById('toastMsg');
    const modal = document.getElementById('roomModal');
    const roomCodeInput = document.getElementById('roomCodeInput');
    const modalTitle = document.getElementById('modalTitle');
    
    let modalResolve = null;
    
    // 初始化Supabase
    function initSupabase() {
        if (!window.supabase) {
            setTimeout(initSupabase, 200);
            return;
        }
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        // 加载当前房间数据
        refreshCurrentRoomDisplay();
        fetchRankingByRoom(currentRoom);
        subscribeRoomChanges();
    }
    
    // 刷新房间显示
    function refreshCurrentRoomDisplay() {
        currentRoomSpan.innerText = currentRoom;
        localStorage.setItem('active_room_id', currentRoom);
    }
    
    // 获取当前房间排行榜
    async function fetchRankingByRoom(roomId) {
        if (!supabase) return;
        try {
            const { data, error } = await supabase
                .from('players_multi')
                .select('id, name, score')
                .eq('room_id', roomId)
                .order('score', { ascending: false })
                .order('name', { ascending: true });
            if (error) throw error;
            renderRanking(data || []);
        } catch (err) {
            console.error(err);
            // 如果表不存在尝试创建提示（实际项目中需手动建表，但为流畅这里给友好提示）
            if (err.message && err.message.includes('relation') && err.message.includes('does not exist')) {
                rankContainer.innerHTML = '<div class="empty-state">⚠️ 数据库表未就绪，请稍后或联系管理员建表 players_multi</div>';
                showToast('房间数据表缺失，请确认后端配置', 2000);
            } else {
                rankContainer.innerHTML = '<div class="empty-state">网络波动，下拉刷新页面</div>';
                showToast('加载失败，检查网络', 1500);
            }
        }
    }
    
    // 渲染排行榜
    function renderRanking(players) {
        if (!rankContainer) return;
        if (!players.length) {
            rankContainer.innerHTML = '<div class="empty-state">✨ 暂无玩家，快加入成为第一 ✨</div>';
            return;
        }
        let html = '';
        players.forEach((p, idx) => {
            const rank = idx + 1;
            let rankClass = '';
            let crown = '';
            if (rank === 1) { rankClass = 'rank-1'; crown = '👑'; }
            else if (rank === 2) rankClass = 'rank-2';
            else if (rank === 3) rankClass = 'rank-3';
            const safeName = escapeHtml(p.name) || '无名';
            const score = p.score ?? 0;
            html += `
                <div class="rank-item" data-id="${p.id}">
                    <div class="rank-num ${rankClass}">${rank}${crown}</div>
                    <div class="player-name">${safeName}</div>
                    <div class="score-box">
                        <span class="score-number">${score}</span>
                        <div class="score-actions">
                            <button class="score-btn btn-plus" data-id="${p.id}" data-delta="10">+1</button>
                            <button class="score-btn btn-minus" data-id="${p.id}" data-delta="-10">-1</button>
                        </div>
                    </div>
                </div>
            `;
        });
        rankContainer.innerHTML = html;
        // 绑定加减事件
        document.querySelectorAll('.btn-plus, .btn-minus').forEach(btn => {
            btn.removeEventListener('click', scoreHandler);
            btn.addEventListener('click', scoreHandler);
        });
    }
    
    // 积分变动处理
    async function scoreHandler(e) {
        e.stopPropagation();
        const btn = e.currentTarget;
        const playerId = btn.getAttribute('data-id');
        const delta = parseInt(btn.getAttribute('data-delta'), 10);
        if (!playerId || isNaN(delta)) return;
        try {
            const { data: current, error: fetchErr } = await supabase
                .from('players_multi')
                .select('score')
                .eq('id', playerId)
                .single();
            if (fetchErr) throw fetchErr;
            let newScore = (current.score || 0) + delta;
            if (newScore < 0) {
                showToast('积分不能小于0', 800);
                return;
            }
            if (newScore > 99999) newScore = 99999;
            const { error: updateErr } = await supabase
                .from('players_multi')
                .update({ score: newScore, updated_at: new Date() })
                .eq('id', playerId);
            if (updateErr) throw updateErr;
            showToast(`${delta > 0 ? '+' : ''}${delta} 分`, 500);
        } catch (err) {
            console.error(err);
            showToast('操作失败，请重试', 1200);
        }
    }
    
    // 添加新玩家
    async function addPlayerToRoom() {
        if (!supabase) { showToast('客户端初始化中', 1000); return; }
        const nameInput = document.getElementById('playerName');
        const scoreInput = document.getElementById('initScore');
        let rawName = nameInput.value.trim();
        if (!rawName) { showToast('请输入昵称', 1000); return; }
        if (rawName.length > 16) { showToast('昵称不能超过16字', 1000); return; }
        let initScore = parseInt(scoreInput.value, 10);
        if (isNaN(initScore)) initScore = 0;
        if (initScore < 0) initScore = 0;
        if (initScore > 9999) initScore = 9999;
        
        // 检查同房间重名
        try {
            const { data: exist, error: checkErr } = await supabase
                .from('players_multi')
                .select('name')
                .eq('room_id', currentRoom)
                .eq('name', rawName)
                .maybeSingle();
            if (checkErr && checkErr.code !== 'PGRST116') throw checkErr;
            if (exist) { showToast('当前房间昵称已存在', 1200); return; }
            
            const { error: insertErr } = await supabase
                .from('players_multi')
                .insert([{ name: rawName, score: initScore, room_id: currentRoom, created_at: new Date(), updated_at: new Date() }]);
            if (insertErr) throw insertErr;
            showToast(`🎉 ${rawName} 加入 [${currentRoom}]`, 1000);
            nameInput.value = '';
            scoreInput.value = '0';
        } catch (err) {
            console.error(err);
            showToast('添加失败，请重试', 1300);
        }
    }
    
    // 实时订阅（按房间过滤更优雅，但为了简单，订阅所有变化后根据当前房间重新拉取）
    function subscribeRoomChanges() {
        if (!supabase) return;
        if (realtimeChannel) {
            supabase.removeChannel(realtimeChannel);
        }
        const channel = supabase
            .channel('public:players_multi')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'players_multi' }, payload => {
                // 任何变动都刷新当前房间（简单可靠）
                fetchRankingByRoom(currentRoom);
            })
            .subscribe();
        realtimeChannel = channel;
    }
    
    // 切换房间
    async function switchToRoom(newRoomId) {
        if (!newRoomId || newRoomId.trim() === '') return false;
        const cleanId = newRoomId.trim().slice(0, 20);
        if (cleanId === currentRoom) {
            showToast('已是当前房间', 800);
            return false;
        }
        currentRoom = cleanId;
        refreshCurrentRoomDisplay();
        await fetchRankingByRoom(currentRoom);
        // 重新订阅（保留）
        subscribeRoomChanges();
        showToast(`已切换至房间「${currentRoom}」`, 1200);
        return true;
    }
    
    // 新建随机房间
    function createNewRoom() {
        const newId = 'room_' + Math.random().toString(36).substring(2, 8);
        switchToRoom(newId);
    }
    
    // 弹窗交互 (切换房间)
    function showRoomModal() {
        modalTitle.innerText = '🔁 切换房间';
        roomCodeInput.value = '';
        modal.style.visibility = 'visible';
        modal.style.opacity = '1';
        return new Promise((resolve) => {
            modalResolve = resolve;
        });
    }
    
    function closeModal() {
        modal.style.visibility = 'hidden';
        modal.style.opacity = '0';
        if (modalResolve) modalResolve(null);
        modalResolve = null;
    }
    
    // helper
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    let toastTimer = null;
    function showToast(msg, duration = 1500) {
        if (!toastMsg) return;
        toastMsg.innerText = msg;
        toastMsg.style.opacity = '1';
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
            toastMsg.style.opacity = '0';
        }, duration);
    }
    
    // 绑定UI事件
    document.getElementById('addPlayerBtn').addEventListener('click', addPlayerToRoom);
    document.getElementById('switchRoomBtn').addEventListener('click', async () => {
        await showRoomModal();
    });
    document.getElementById('createRoomBtn').addEventListener('click', () => {
        createNewRoom();
    });
    document.getElementById('modalConfirmBtn').addEventListener('click', async () => {
        const newId = roomCodeInput.value.trim();
        if (newId) {
            await switchToRoom(newId);
        } else {
            showToast('请输入房间ID', 800);
        }
        closeModal();
    });
    document.getElementById('modalCancelBtn').addEventListener('click', () => {
        closeModal();
    });
    // 点击遮罩关闭
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });
    // 回车
    roomCodeInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            document.getElementById('modalConfirmBtn').click();
        }
    });
    // 昵称回车
    const nameField = document.getElementById('playerName');
    const scoreField = document.getElementById('initScore');
    if (nameField) nameField.addEventListener('keypress', (e) => { if(e.key === 'Enter') addPlayerToRoom(); });
    if (scoreField) scoreField.addEventListener('keypress', (e) => { if(e.key === 'Enter') addPlayerToRoom(); });
    
    // 启动
    initSupabase();
    
    // 定时刷新兜底 (保持同步)
    setInterval(() => {
        if (supabase) fetchRankingByRoom(currentRoom);
    }, 35000);
</script>
</body>
</html>
